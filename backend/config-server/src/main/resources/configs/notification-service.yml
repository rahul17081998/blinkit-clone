# ─────────────────────────────────────────────────────────────────
# notification-service specific config — overrides shared application.yml
# ─────────────────────────────────────────────────────────────────

spring:
  data:
    mongodb:
      database: notification_db
  kafka:
    consumer:
      group-id: notification-service-group
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

app:
  password-reset-base-url: ${PASSWORD_RESET_BASE_URL}
  admin-email: ${ADMIN_EMAIL}

management:
  endpoints:
    web:
      exposure:
        include: health,info    # notification-service doesn't expose metrics

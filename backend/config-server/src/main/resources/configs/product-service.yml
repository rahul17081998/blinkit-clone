spring:
  data:
    mongodb:
      database: product_db
      auto-index-creation: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

product:
  cache:
    category-ttl-minutes: 10
    featured-ttl-minutes: 30

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

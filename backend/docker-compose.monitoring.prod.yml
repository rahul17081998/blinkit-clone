services:

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: blinkit-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux fix: resolves host machine IP from inside container
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:10.4.2
    container_name: blinkit-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.prod                         # production secrets
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=${SMTP_HOST}:${SMTP_PORT}
      - GF_SMTP_USER=${SMTP_USERNAME}
      - GF_SMTP_PASSWORD=${SMTP_PASSWORD}
      - GF_SMTP_FROM_ADDRESS=${SMTP_USERNAME}
      - GF_SMTP_FROM_NAME=Blinkit Monitoring
      - GF_SMTP_STARTTLS_POLICY=MandatoryStartTLS
      - GF_ALERTING_ENABLED=false
      - GF_UNIFIED_ALERTING_ENABLED=true
    volumes:
      - grafana_data:/var/lib/grafana
      # Prod: datasources
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      # Prod: dashboards.yml (common) + prod-dashboards.yml (Oracle VM Free Tier)
      # dev-dashboards.yml (Mac System Resources) NOT mounted
      - ./grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./grafana/provisioning/dashboards/prod-dashboards.yml:/etc/grafana/provisioning/dashboards/prod-dashboards.yml:ro
      # Prod: full alerting — includes oracle-vm-alerts.yml
      - ./grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
      # Prod: common + prod dashboards only (no dashboards-dev → no Mac System Resources)
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/dashboards-prod:/var/lib/grafana/dashboards-prod:ro
    depends_on:
      - prometheus
    networks:
      - monitoring

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: blinkit-kafka-exporter
    restart: unless-stopped
    ports:
      - "9308:9308"
    command:
      - "--kafka.server=kafka:29092"   # internal Docker listener — advertises 'kafka:29092' which resolves inside Docker
      - "--offset.show-all"            # export lag for ALL consumer groups, even when lag=0
                                       # without this, kafka_consumergroup_lag only appears when lag>0
                                       # causing "No data" in Grafana panels on healthy environments
    networks:
      - monitoring                    # Prometheus can resolve kafka-exporter:9308
      - backend_blinkit-network       # so 'kafka' hostname resolves

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: blinkit-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge
  backend_blinkit-network:
    external: true                     # created by docker-compose.infra.yml

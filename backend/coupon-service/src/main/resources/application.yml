server:
  port: 8090

spring:
  application:
    name: coupon-service
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
      - configserver:http://${CONFIG_SERVER_HOST:localhost}:${CONFIG_SERVER_PORT:8888}
  data:
    mongodb:
      uri: ${MONGO_URI}    # resolved from .env; database overridden by config-server

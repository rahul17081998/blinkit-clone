server:
  port: 8090

spring:
  application:
    name: coupon-service
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
      - configserver:${CONFIG_SERVER_URL}
  data:
    mongodb:
      uri: ${MONGO_URI}    # resolved from .env; database overridden by config-server

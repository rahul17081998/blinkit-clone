server:
  port: 8088

spring:
  application:
    name: delivery-service
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
      - configserver:${CONFIG_SERVER_URL}

# delivery.* config is loaded from config-server (delivery-service.yml)
# with values sourced from env vars (DELIVERY_STORE_NAME, DELIVERY_STORE_LAT, etc.)

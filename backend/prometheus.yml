global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

# ── Stage 1: user-service only ───────────────────────────────────────────────
# Stage 2 will add all remaining services here.
# Spring Boot services run on the host machine (not inside Docker).
# host.docker.internal resolves to the host from inside Docker containers.
# docker-compose.monitoring.yml sets: extra_hosts: host.docker.internal:host-gateway

scrape_configs:

  # ── Node Exporter — VM-level OS metrics (CPU, RAM, Disk, Network) ───────────
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  # ── User Service ─────────────────────────────────────────────────────────────
  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8082']

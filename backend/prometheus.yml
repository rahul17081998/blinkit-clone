global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

# Spring Boot services run on the host machine (not inside Docker).
# host.docker.internal resolves to the host from inside Docker containers.
# docker-compose.monitoring.yml sets: extra_hosts: host.docker.internal:host-gateway

scrape_configs:

  # ── Node Exporter — VM-level OS metrics (CPU, RAM, Disk, Network) ───────────
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  # ── Stage 2: All Spring Boot services ────────────────────────────────────────

  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8080']

  - job_name: auth-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8081']

  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8082']

  - job_name: product-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8083']

  - job_name: inventory-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8084']

  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8085']

  - job_name: payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8086']

  - job_name: cart-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8087']

  - job_name: delivery-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8088']

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8089']

  - job_name: metrics-exporter
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8092']

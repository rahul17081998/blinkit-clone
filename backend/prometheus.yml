global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

# Spring Boot services run on the host machine (not inside Docker).
# host.docker.internal resolves to the host from inside Docker containers.
# docker-compose.monitoring.yml sets: extra_hosts: host.docker.internal:host-gateway

scrape_configs:

  # -- Node Exporter - VM-level OS metrics (CPU, RAM, Disk, Network) -----------
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  # -- Infrastructure services ---------------------------------------------------

  - job_name: eureka-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8761']

  - job_name: config-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8888']

  # -- Stage 2: All Spring Boot services ----------------------------------------

  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8080']

  - job_name: auth-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8081']

  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8082']

  - job_name: product-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8083']

  - job_name: inventory-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8084']

  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8085']

  - job_name: payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8086']

  - job_name: cart-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8087']

  - job_name: delivery-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8088']

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8089']

  - job_name: coupon-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8090']

  - job_name: review-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8091']

  # -- metrics-exporter: custom business metrics (orders, inventory, infra health) --
  - job_name: metrics-exporter
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8092']

  # -- metrics-exporter: JVM/process metrics via Spring Boot Actuator -------------
  # Separate job because /metrics serves the isolated businessMetricsRegistry (cleared each scrape)
  # while /actuator/prometheus serves the @Primary jvmMetricsRegistry (JVM heap, CPU, threads, uptime).
  # relabel_configs renames the job label from 'metrics-exporter-jvm' to 'metrics-exporter' so
  # Grafana shows ONE row for this service (not two separate rows).
  - job_name: metrics-exporter-jvm
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8092']
    relabel_configs:
      - target_label: job
        replacement: metrics-exporter

  # -- Kafka Exporter - consumer lag, topic & partition metrics --------------
  - job_name: kafka-exporter
    static_configs:
      - targets: ['kafka-exporter:9308']

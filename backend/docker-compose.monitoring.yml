services:

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: blinkit-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:10.4.2
    container_name: blinkit-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.dev                          # source of all secrets — never hardcoded here
    environment:
      # Admin credentials from .env.dev
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      # SMTP — all values from .env.dev
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=${SMTP_HOST}:${SMTP_PORT}
      - GF_SMTP_USER=${SMTP_USERNAME}
      - GF_SMTP_PASSWORD=${SMTP_PASSWORD}
      - GF_SMTP_FROM_ADDRESS=${SMTP_USERNAME}
      - GF_SMTP_FROM_NAME=Blinkit Monitoring
      - GF_SMTP_STARTTLS_POLICY=MandatoryStartTLS
      # Unified alerting
      - GF_ALERTING_ENABLED=false
      - GF_UNIFIED_ALERTING_ENABLED=true
    volumes:
      - grafana_data:/var/lib/grafana
      # Dev: datasources
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      # Dev: dashboards.yml (common) + dev-dashboards.yml (Mac System Resources)
      # prod-dashboards.yml (Oracle VM) is NOT mounted
      - ./grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./grafana/provisioning/dashboards/dev-dashboards.yml:/etc/grafana/provisioning/dashboards/dev-dashboards.yml:ro
      # Dev: only infra-alerts — oracle-vm-alerts.yml NOT mounted
      - ./grafana/provisioning/alerting/infra-alerts.yml:/etc/grafana/provisioning/alerting/infra-alerts.yml:ro
      # Dev: common + dev dashboards only (no dashboards-prod → no Oracle VM dashboard)
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/dashboards-dev:/var/lib/grafana/dashboards-dev:ro
    depends_on:
      - prometheus
    networks:
      - monitoring

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: blinkit-kafka-exporter
    restart: unless-stopped
    ports:
      - "9308:9308"
    command:
      - "--kafka.server=kafka:29092"   # internal Docker listener — avoids localhost:9092 resolution issue
      - "--offset.show-all"            # export lag for ALL consumer groups, even when lag=0
                                       # without this, kafka_consumergroup_lag only appears when lag>0
                                       # causing "No data" in Grafana panels on healthy dev environments
    networks:
      - monitoring
      - backend_blinkit-network         # joins infra network so 'kafka' hostname resolves

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: blinkit-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge
  backend_blinkit-network:
    external: true                     # created by docker-compose.infra.yml

server:
  port: 8761

spring:
  application:
    name: eureka-server
  cloud:
    config:
      enabled: false

eureka:
  client:
    # Eureka server does not register itself or fetch registry from another server
    register-with-eureka: false
    fetch-registry: false
  server:
    # Don't wait for other Eureka peers on startup (we run single instance)
    wait-time-in-ms-when-sync-empty: 0
    # Remove unresponsive instances faster in dev (default is 60s × 3 = 3 min)
    eviction-interval-timer-in-ms: 10000
  instance:
    hostname: localhost

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: eureka-server

logging:
  level:
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN

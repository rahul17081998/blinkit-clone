server:
  port: 8081

spring:
  application:
    name: auth-service
  config:
    import:
      - optional:file:.env[.properties]       # when CWD = backend/ (start-backend.sh)
      - optional:file:../.env[.properties]    # when CWD = service dir (IntelliJ)
      - configserver:http://${CONFIG_SERVER_HOST:localhost}:${CONFIG_SERVER_PORT:8888}
  data:
    mongodb:
      uri: ${MONGO_URI}                        # resolved from .env or OS env
